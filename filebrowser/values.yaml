# -- Override the chart name portion of resource names
nameOverride: ""
# -- Override the full resource name (ignores release name and chart name)
fullnameOverride: ""

# -- Container image
image:
  repository: ghcr.io/gtsteffaniak/filebrowser
  # -- Overrides the image tag (default is Chart.appVersion)
  tag: ""
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Pod-level security context
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext:
  runAsUser: 1000
  runAsNonRoot: true
  fsGroup: 1000

# -- Container-level security context
containerSecurityContext: {}
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: false
  # capabilities:
  #   drop: [ALL]

# -- Resource requests and limits
resources:
  requests:
    cpu: 300m
    memory: 150Mi
  limits:
    cpu: 500m
    memory: 300Mi

# -- Extra annotations to add to the pod
podAnnotations: {}

# -- Extra labels to add to the pod
podLabels: {}

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- ServiceAccount configuration
serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: false
  # -- Annotations (e.g., for AWS IRSA or GCP Workload Identity)
  annotations: {}
  # -- Name override. When create=false and name is empty, uses "default"
  name: ""

# -- Service configuration
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# -- Ingress configuration
ingress:
  enabled: false
  # -- Ingress class name (e.g., nginx, traefik)
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-body-size: "10g"
  hosts:
    - host: filebrowser.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration. Leave empty [] for no TLS.
  tls: []
  #  - secretName: filebrowser-tls
  #    hosts:
  #      - filebrowser.example.com

# -- Secret configuration for sensitive values.
# All sensitive fields are stored in a Kubernetes Secret and injected as
# FILEBROWSER_* environment variables, which override config file values.
secret:
  # -- Use an existing Secret instead of generating one.
  # Must contain keys: FILEBROWSER_ADMIN_PASSWORD, FILEBROWSER_JWT_TOKEN_SECRET
  # Optional keys: FILEBROWSER_TOTP_SECRET, FILEBROWSER_OIDC_CLIENT_ID,
  #   FILEBROWSER_OIDC_CLIENT_SECRET, FILEBROWSER_ONLYOFFICE_SECRET,
  #   FILEBROWSER_RECAPTCHA_SECRET
  existingSecret: ""
  # -- Auto-generated admin password length (only when existingSecret is empty
  # and adminPassword is not set)
  adminPasswordLength: 20
  # -- Set a specific admin password. Leave empty to auto-generate.
  adminPassword: ""
  # -- JWT signing key. Leave empty to auto-generate.
  # WARNING: if auto-generated and the Secret is deleted, all sessions are invalidated.
  jwtSecret: ""
  # -- TOTP encryption secret
  totpSecret: ""
  # -- OIDC client ID
  oidcClientId: ""
  # -- OIDC client secret
  oidcClientSecret: ""
  # -- OnlyOffice JWT secret
  onlyofficeSecret: ""
  # -- reCAPTCHA secret key
  recaptchaSecret: ""

# -- Persistence configuration. Config and data PVCs are independent.
persistence:
  # -- Config PVC: stores the FileBrowser database and runtime state
  config:
    enabled: true
    # -- Use an existing PVC (skips PVC creation)
    existingClaim: ""
    # -- Storage class. Empty string "" uses the cluster default.
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    # -- Add helm.sh/resource-policy: keep to prevent deletion on helm uninstall
    retain: true
    annotations: {}
    labels: {}
  # -- Data PVC: stores user files
  data:
    enabled: true
    # -- Use an existing PVC (skips PVC creation)
    existingClaim: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    retain: true
    annotations: {}
    labels: {}

# -- Extra volumes to add to the pod
# Ref: https://kubernetes.io/docs/concepts/storage/volumes/
extraVolumes: []
  # - name: raw-data
  #   persistentVolumeClaim:
  #     claimName: raw-data

# -- Extra volume mounts for the filebrowser container.
# Remember to add mounted paths as sources in the config below.
extraVolumeMounts: []
  # - name: raw-data
  #   mountPath: /srv/raw-data
  #   readOnly: false

# -- Extra environment variables for the container
extraEnv: []
  # - name: TZ
  #   value: "Europe/Berlin"

# -- Application configuration. Rendered verbatim as config.yaml and mounted into the pod.
# All fields map 1:1 to the FileBrowser Quantum config file format.
# Ref: https://filebrowserquantum.com/en/docs/configuration/configuration-overview/
#
# NOTE: Sensitive fields (auth.key, auth.adminPassword, oidc.clientSecret, etc.)
# should NOT be set here — they are injected via environment variables from the Secret.
config:
  server:
    port: 8080
    baseURL: /
    listen: ""
    socket: ""
    externalUrl: ""
    internalUrl: ""
    database: /home/filebrowser/data/database.db
    cacheDir: "tmp"
    cacheDirCleanup: false
    maxArchiveSize: 50
    minSearchLength: 3
    numImageProcessors: 4
    disableUpdateCheck: false
    disablePreviews: false
    disablePreviewResize: false
    disableTypeDetectionByHeader: false
    tlsKey: ""
    tlsCert: ""
    logging:
      - levels: ""
        apiLevels: ""
        output: "stdout"
        noColors: false
        json: false
        utc: false
    sources:
      - path: /data
        name: "Data"
        config:
          denyByDefault: false
          private: false
          disabled: false
          defaultEnabled: true
          defaultUserScope: "/"
          createUserDir: false
          useLogicalSize: false
          rules:
            - neverWatchPath: ""
              includeRootItem: ""
              fileStartsWith: ""
              folderStartsWith: ""
              fileEndsWith: ""
              folderEndsWith: ""
              folderPath: ""
              filePath: ""
              fileName: ""
              folderName: ""
              viewable: false
              ignoreHidden: false
              ignoreZeroSizeFolders: false
              ignoreSymlinks: false
    filesystem:
      createFilePermission: "644"
      createDirectoryPermission: "755"
    indexSqlConfig:
      batchSize: 1000
      cacheSizeMB: 32
      walMode: false
      disableReuse: false
  auth:
    tokenExpirationHours: 2
    adminUsername: "admin"
    methods:
      proxy:
        enabled: false
        createUser: false
        header: ""
        logoutRedirectUrl: ""
      noauth: false
      password:
        enabled: true
        minLength: 20
        signup: false
        enforcedOtp: false
        recaptcha:
          host: ""
          key: ""
      oidc:
        enabled: false
        issuerUrl: ""
        scopes: "openid email profile"
        userIdentifier: "preferred_username"
        disableVerifyTLS: false
        logoutRedirectUrl: ""
        createUser: false
        adminGroup: ""
        groupsClaim: "groups"
  frontend:
    name: "FileBrowser Quantum"
    disableDefaultLinks: false
    disableUsedPercentage: false
    disableNavButtons: false
    favicon: ""
    description: "FileBrowser Quantum is a file manager for the web which can be used to manage files on your server"
    loginIcon: ""
    oidcLoginButtonText: ""
    externalLinks:
      - text: "Chart (Softwaredam)"
        title: "Chart (Softwaredam)"
        url: "https://github.com/Softwaredam/filebrowser-chart/"
      - text: "Release sources"
        title: "Release sources"
        url: "https://github.com/gtsteffaniak/filebrowser/releases/"
    styling:
      disableEventThemes: false
      customCSS: ""
      lightBackground: "#f5f5f5"
      darkBackground: "#141D24"
      customThemes:
        alternative:
          description: "Reduce rounded corners"
          css: "reduce-rounded-corners.css"
        default:
          description: "The default theme"
          css: ""
  userDefaults:
    darkMode: true
    locale: "en"
    viewMode: "normal"
    singleClick: false
    showHidden: false
    dateFormat: false
    gallerySize: 3
    themeColor: "var(--blue)"
    quickDownload: false
    stickySidebar: true
    editorQuickSave: false
    hideSidebarFileActions: false
    disableQuickToggles: false
    disableSearchOptions: false
    disablePreviewExt: ""
    disableViewingExt: ""
    lockPassword: false
    disableSettings: false
    deleteWithoutConfirming: false
    disableUpdateNotifications: false
    loginMethod: "password"
    customTheme: ""
    showSelectMultiple: false
    debugOffice: false
    disableOnlyOfficeExt: ".md .txt .pdf .html .xml"
    preview:
      disableHideSidebar: false
      highQuality: true
      image: true
      video: true
      motionVideoPreview: true
      office: true
      popup: true
      autoplayMedia: true
      defaultMediaPlayer: false
      folder: true
    permissions:
      api: false
      admin: false
      modify: false
      share: false
      realtime: false
      delete: false
      create: false
      download: true
    fileLoading:
      maxConcurrentUpload: 10
      uploadChunkSizeMb: 10
      clearAll: false
      downloadChunkSizeMb: 0
  integrations:
    office:
      url: ""
      internalUrl: ""
      viewOnly: false
    media:
      ffmpegPath: ""
      convert:
        imagePreview:
          heic: false
          jpeg: true
        videoPreview:
          3g2: true
          3gp: true
          asf: true
          avi: true
          f4v: true
          flv: true
          m2ts: true
          m4v: true
          mkv: true
          mov: true
          mp4: true
          mpeg: true
          mpg: true
          ogv: true
          ts: true
          vob: true
          webm: true
          wmv: true
      debug: false
      extractEmbeddedSubtitles: false
