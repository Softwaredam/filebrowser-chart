apiVersion: v1
kind: Service
metadata:
  name: {{ include "filebrowser-quantum.fullname" . }}
  labels:
    {{- include "filebrowser-quantum.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "filebrowser-quantum.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
